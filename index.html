<!DOCTYPE html>
<html lang="fr"> 
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="page-title">Portfolio</title>
  <link rel="icon" type="image/png" href="assets/images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
      } else {
        document.documentElement.classList.add('dark-theme');
      }
    })();

    function toggleTheme() {
      const isDark = document.documentElement.classList.contains('dark-theme');
      const isLight = document.documentElement.classList.contains('light-theme');
      let targetDark = false;
      if (isDark) {
        targetDark = false;
      } else if (isLight) {
        targetDark = true;
      } else {
        targetDark = !window.matchMedia('(prefers-color-scheme: dark)').matches;
      }
      
      if (targetDark) {
        document.documentElement.classList.remove('light-theme');
        document.documentElement.classList.add('dark-theme');
        localStorage.setItem('theme', 'dark');
      } else {
        document.documentElement.classList.remove('dark-theme');
        document.documentElement.classList.add('light-theme');
        localStorage.setItem('theme', 'light');
      }
    }
  </script>
</head>
<body>

  <div id="header-placeholder"></div>

  <main class="main-content">
    <section class="content-area" id="app-content">
      </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="assets/js/lang-switch.js"></script> 
  
  <script src="assets/js/router.js"></script>

  <script src="assets/js/inject_components.js"></script>

  <script src="assets/js/animations.js"></script>
  
</body>
</html>
